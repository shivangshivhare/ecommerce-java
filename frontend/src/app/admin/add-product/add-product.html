<div class="container d-flex justify-content-center mt-5">

  <div class="border p-4" style="width: 600px;">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <h5 class="mb-0">Add Product</h5>
      <span class="badge bg-primary rounded-pill px-4 py-2">Username</span>
    </div>

    <form>

      <div class="row mb-3">
        <div class="col-4 text-end">
          <label class="form-label">Product Name :</label>
        </div>
        <div class="col-5">
          <input type="text" class="form-control form-control-sm"
                 [(ngModel)]="product.name" name="name">
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-4 text-end">
          <label class="form-label">Product Category :</label>
        </div>
        <div class="col-5">
          <input type="text" class="form-control form-control-sm"
                 [(ngModel)]="product.category" name="category">
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-4 text-end">
          <label class="form-label">Price :</label>
        </div>
        <div class="col-5">
          <input type="number" class="form-control form-control-sm"
                 [(ngModel)]="product.price" name="price">
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-4 text-end">
          <label class="form-label">UOM :</label>
        </div>
        <div class="col-5">
          <input type="text" class="form-control form-control-sm"
                 [(ngModel)]="product.uom" name="uom">
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-4 text-end">
          <label class="form-label">QTY :</label>
        </div>
        <div class="col-5">
          <input type="number" class="form-control form-control-sm"
                 [(ngModel)]="product.quantity" name="quantity">
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-4 text-end">
          <label class="form-label">Description :</label>
        </div>
        <div class="col-5">
          <input type="text" class="form-control form-control-sm"
                 [(ngModel)]="product.description" name="description">
        </div>
      </div>

      <div class="row mb-4">
        <div class="col-4 text-end">
          <label class="form-label">Image URL :</label>
        </div>
        <div class="col-5">
          <input type="text" class="form-control form-control-sm"
                 [(ngModel)]="product.imageUrl" name="imageUrl">
        </div>
      </div>

      <div class="text-center">
        <button class="btn btn-primary px-5" (click)="save()">Save</button>
      </div>

    </form>

  </div>

</div>
