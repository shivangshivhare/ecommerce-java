<div class="container mt-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-3">

    <button class="btn btn-gradient btn-sm" (click)="add()">+ Add Product</button>

    <div class="position-relative">

      <div class="user-badge" (click)="toggleDropdown()">
        Shivang Shivhare ▼
      </div>

      <div *ngIf="dropdownOpen" class="dropdown-menu-custom">
        <div class="dropdown-item text-danger" (click)="logout()">Logout</div>
      </div>

    </div>

  </div>

  <!-- SEARCH -->
  <div class="card p-3 shadow-sm mb-3">

    <div class="d-flex gap-2 flex-wrap">

      <select class="form-select form-select-sm w-auto" [(ngModel)]="searchCategory">
        <option value="">All Categories</option>
        <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
      </select>

      <input 
        type="text"
        class="form-control form-control-sm w-50"
        placeholder="Search product..."
        [(ngModel)]="searchText"
      >

      <button class="btn btn-gradient btn-sm" (click)="search()">Search</button>

    </div>

  </div>

  <!-- SORT -->
  <div class="mb-3">
    <button class="btn btn-sort btn-sm me-2" (click)="sort('price')">
      Price {{ sortField === 'price' ? (sortDirection === 'asc' ? '↑' : '↓') : '' }}
    </button>

    <button class="btn btn-sort btn-sm" (click)="sort('quantity')">
      Quantity {{ sortField === 'quantity' ? (sortDirection === 'asc' ? '↑' : '↓') : '' }}
    </button>
  </div>

  <!-- TABLE -->
  <div class="table-responsive">

    <table class="table custom-table align-middle text-center">

      <thead>
        <tr>
          <th class="text-start">Product</th>
          <th>Category</th>
          <th>Price</th>
          <th>UOM</th>
          <th>Stock</th>
          <th>Status</th>
          <th>Description</th>
          <th>Edit</th>
          <th>Delete</th>
        </tr>
      </thead>

      <tbody *ngIf="products.length > 0; else noData">

        <tr *ngFor="let p of paginatedProducts; trackBy: trackById">

          <!-- PRODUCT -->
          <td class="text-start d-flex align-items-center gap-2">

            <img 
              [src]="p.imageUrl || 'https://via.placeholder.com/60'"
              class="table-img"
            >

            <span class="fw-semibold">{{ p.name }}</span>

          </td>

          <td>{{ p.category }}</td>

          <td>₹ {{ p.price }}</td>

          <td>{{ p.uom }}</td>

          <td>
            <span [ngClass]="p.quantity > 0 ? 'text-success fw-bold' : 'text-danger fw-bold'">
              {{ p.quantity }}
            </span>
          </td>

          <td>
            <span 
              class="badge"
              [ngClass]="p.quantity > 0 ? 'bg-success' : 'bg-danger'"
            >
              {{ p.quantity > 0 ? 'In Stock' : 'Out of Stock' }}
            </span>
          </td>

          <td class="text-truncate" style="max-width:200px;">
            {{ p.description }}
          </td>

          <!-- EDIT -->
          <td>
            <button class="btn btn-warning btn-sm" (click)="edit(p.id)">
              Edit
            </button>
          </td>

          <!-- DELETE -->
          <td>

            <ng-container *ngIf="confirmDeleteId !== p.id">
              <button class="btn btn-danger btn-sm" (click)="askDelete(p.id)">
                Delete
              </button>
            </ng-container>

            <div *ngIf="confirmDeleteId === p.id" class="d-flex gap-1 justify-content-center">
              <button class="btn btn-danger btn-sm" (click)="confirmDelete(p.id)">Yes</button>
              <button class="btn btn-secondary btn-sm" (click)="cancelDelete()">Cancel</button>
            </div>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

  <!-- NO DATA -->
  <ng-template #noData>
    <div class="text-center mt-3 text-muted">
      No data found
    </div>
  </ng-template>

  <!-- PAGINATION -->
  <div class="text-center mt-4">

    <button 
      class="btn btn-outline-primary btn-sm me-2"
      (click)="page = page - 1"
      [disabled]="page === 1"
    >
      Prev
    </button>

    <button 
      class="btn btn-outline-primary btn-sm"
      (click)="page = page + 1"
      [disabled]="page * pageSize >= products.length"
    >
      Next
    </button>

  </div>

</div>
