<div class="container d-flex justify-content-center mt-5">

  <div class="card shadow-lg form-card">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

      <h5 class="fw-bold mb-0">Edit Product</h5>

      <div class="user-badge" (click)="logout()">
        {{ username }}
      </div>

    </div>

    <form #f="ngForm">

      <div class="row g-3">

        <!-- NAME -->
        <div class="col-md-6">
          <label class="form-label">Product Name</label>
          <input type="text" class="form-control"
                 [(ngModel)]="product.name" name="name" required #name="ngModel">
          <small class="text-danger" *ngIf="name.invalid && name.touched">
            Required
          </small>
        </div>

        <!-- CATEGORY -->
        <div class="col-md-6">
          <label class="form-label">Category</label>
          <select class="form-select"
                  [(ngModel)]="product.category"
                  name="category"
                  required
                  #cat="ngModel">
            <option value="" disabled>Select Category</option>
            <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
          </select>
          <small class="text-danger" *ngIf="cat.invalid && cat.touched">
            Required
          </small>
        </div>

        <!-- PRICE -->
        <div class="col-md-4">
          <label class="form-label">Price</label>
          <input type="number" class="form-control"
                 [(ngModel)]="product.price" name="price" required min="1" #price="ngModel">
          <small class="text-danger" *ngIf="price.invalid && price.touched">
            Invalid price
          </small>
        </div>

        <!-- UOM -->
        <div class="col-md-4">
          <label class="form-label">UOM</label>
          <input type="text" class="form-control"
                 [(ngModel)]="product.uom" name="uom" required #uom="ngModel">
          <small class="text-danger" *ngIf="uom.invalid && uom.touched">
            Required
          </small>
        </div>

        <!-- QUANTITY -->
        <div class="col-md-4">
          <label class="form-label">Quantity</label>
          <input type="number" class="form-control"
                 [(ngModel)]="product.quantity" name="quantity" required min="1" #qty="ngModel">
          <small class="text-danger" *ngIf="qty.invalid && qty.touched">
            Invalid quantity
          </small>
        </div>

        <!-- DESCRIPTION -->
        <div class="col-12">
          <label class="form-label">Description</label>
          <textarea class="form-control"
                    rows="2"
                    [(ngModel)]="product.description"
                    name="description"></textarea>
        </div>

        <!-- IMAGE URL -->
        <div class="col-md-8">
          <label class="form-label">Image URL</label>
          <input type="text" class="form-control"
                 [(ngModel)]="product.imageUrl" name="imageUrl">
        </div>

        <!-- IMAGE PREVIEW -->
        <div class="col-md-4 text-center">
          <label class="form-label">Preview</label><br>
          <img 
            [src]="product.imageUrl || 'https://via.placeholder.com/100'"
            class="preview-img"
          >
        </div>

      </div>

      <!-- BUTTONS -->
      <div class="text-center mt-4 d-flex justify-content-center gap-3">

        <button class="btn btn-outline-secondary px-4"
                (click)="goBack()">
          Go Back
        </button>

        <button class="btn btn-gradient px-5"
                (click)="update()" [disabled]="f.invalid">
          Update
        </button>

      </div>

    </form>

  </div>

</div>
