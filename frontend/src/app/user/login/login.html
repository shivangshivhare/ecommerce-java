<div class="container-fluid vh-100 login-container">
  <div class="row h-100">

    
    <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center bg-light">
      <img 
        src="https://co-well.vn/wp-content/uploads/2019/12/why-ecommerce-is-important-with-business.png"
        class="img-fluid login-image">
    </div>

    
    <div class="col-md-6 d-flex justify-content-center align-items-center px-5">

      <div class="card shadow-lg p-4 login-card">

        
        <h5 class="text-center text-primary fw-bold mb-1">Login to </h5>
        <h3 class="text-center mb-4 fw-bold">Shop From Us</h3>

        
        <div *ngIf="errorMessage" class="alert alert-danger">
          {{ errorMessage }}
        </div>

        <form (ngSubmit)="login()" #loginForm="ngForm">

          
          <div class="form-group mb-3">
            <label>Email address</label>
            <input 
              type="email"
              class="form-control"
              name="email"
              [(ngModel)]="email"
              placeholder="Enter email"
              required
              #emailRef="ngModel">

            <small class="text-danger" *ngIf="emailRef.invalid && emailRef.touched">
              Email is required
            </small>
          </div>

        
          <div class="form-group mb-3">
            <label>Password</label>
            <input 
              type="password"
              class="form-control"
              name="password"
              [(ngModel)]="password"
              placeholder="Password"
              required
              minlength="4"
              #passwordRef="ngModel">

            <small class="text-danger" *ngIf="passwordRef.invalid && passwordRef.touched">
              Password is required (min 4 chars)
            </small>
          </div>

          
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input type="checkbox" class="form-check-input">
              <label class="form-check-label">Remember me</label>
            </div>

            <a href="#" (click)="forgotPassword()" class="text-decoration-none">
              Forgot Password?
            </a>
          </div>

          
          <button type="submit" 
                  class="btn btn-primary w-100 mb-3 fw-bold"
                  [disabled]="loginForm.invalid">
            Login
          </button>

        
          <div class="text-center mb-3 text-muted">or sign in with</div>

          <div class="d-flex justify-content-center gap-3 mb-3">
            <button type="button" class="btn btn-outline-danger btn-sm">G</button>
            <button type="button" class="btn btn-outline-primary btn-sm">f</button>
            <button type="button" class="btn btn-outline-dark btn-sm">I</button>
          </div>

          
          <div class="text-center">
            <span>Don't have an account?</span>
            <button 
              type="button" 
              class="btn btn-outline-secondary btn-sm ms-2"
              (click)="goToRegister()">
              Register
            </button>
          </div>

        </form>

      </div>

    </div>

  </div>
</div>
