<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg p-4" style="width: 500px; border-radius: 12px;">

    <h3 class="text-center mb-3">Create Account</h3>
    <p class="text-center text-muted mb-4">Register to start shopping with us!</p>

    <form (ngSubmit)="register()">

      <div class="mb-2">
        <label class="form-label">Email</label>
        <input type="email" class="form-control"
               [(ngModel)]="user.email" name="email" required>
      </div>

      <div class="mb-2">
        <label class="form-label">Username</label>
        <input class="form-control"
               [(ngModel)]="user.username" name="username" required>
      </div>

      <div class="row">
        <div class="col-md-6 mb-2">
          <label class="form-label">First Name</label>
          <input class="form-control"
                 [(ngModel)]="user.firstName" name="firstName">
        </div>

        <div class="col-md-6 mb-2">
          <label class="form-label">Last Name</label>
          <input class="form-control"
                 [(ngModel)]="user.lastName" name="lastName">
        </div>
      </div>

      <div class="mb-2">
        <label class="form-label">Password</label>
        <input type="password" class="form-control"
               [(ngModel)]="user.password" name="password" required>
      </div>

      <div class="mb-2">
        <label class="form-label">Phone Number</label>
        <input class="form-control"
               [(ngModel)]="user.phoneNumber" name="phoneNumber">
      </div>

      <div class="mb-2">
        <label class="form-label">Address</label>
        <textarea class="form-control" rows="2"
                  [(ngModel)]="user.address" name="address"></textarea>
      </div>

      <button class="btn btn-success w-100 mb-3">Register</button>

      <div class="text-center">
  <small>Already have an account?</small><br>
  <button 
    class="btn btn-outline-primary btn-sm mt-2"
    (click)="goToLogin()"
  >
    Login
  </button>
</div>
    </form>

  </div>
</div>
