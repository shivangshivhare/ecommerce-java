<div class="container mt-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="d-flex align-items-center gap-3">
      <button class="btn btn-outline-secondary btn-sm" (click)="goBack()">← Back</button>
      <h3 class="mb-0">Shopping Cart</h3>
    </div>

    <div>
      Welcome, {{ username }}
    </div>
  </div>

  <div class="row">

    <!-- CART ITEMS -->
    <div class="col-md-8">

      <div *ngFor="let item of cartItems" class="card mb-3 p-3">

        <div class="d-flex align-items-center gap-3">

          <!-- IMAGE -->
          <img 
            [src]="item.image || 'https://via.placeholder.com/100'" 
            style="width:100px; height:100px; object-fit:contain;"
          />

          <!-- DETAILS -->
          <div class="flex-grow-1">

            <h5>{{ item.name || ('Product ID: ' + item.productId) }}</h5>
            <p class="mb-2">₹{{ item.price }}</p>

            <!-- QUANTITY -->
            <div class="d-flex align-items-center gap-2">

              <button class="btn btn-sm btn-outline-secondary" (click)="decreaseQty(item)">-</button>
              <span>{{ item.quantity }}</span>
              <button class="btn btn-sm btn-outline-secondary" (click)="increaseQty(item)">+</button>

            </div>

          </div>

          <!-- DELETE -->
          <button class="btn btn-danger btn-sm" (click)="removeItem(item.id)">
            Delete
          </button>

        </div>

      </div>

    </div>

    <!-- SUMMARY -->
    <div class="col-md-4">

      <div class="card p-3">

        <h4>Total: ₹{{ getTotal() }}</h4>

        <button class="btn btn-success w-100 mt-3" (click)="checkout()">
          Proceed to Buy
        </button>

      </div>

    </div>

  </div>

</div>
