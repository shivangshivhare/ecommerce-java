<div class="container-fluid p-0">


  <nav class="navbar navbar-dark bg-dark px-3">

   <span 
    class="navbar-brand d-flex align-items-center logo-container" 
    style="cursor:pointer;" 
    (click)="goToCatalog()"
  >

    <img 
     [src]="'assets/3536452-Photoroom.png'"
      alt="Logo"
      class="logo-img"
    />

    <span class="ms-2">Shop With Us</span>

  </span>

<div class="d-flex mx-auto" style="width: 50%; gap:10px;">


  <select class="form-select w-25"
        [(ngModel)]="searchType"
        (change)="search()">

  <option value="">All</option>
  <option *ngFor="let c of categories" [value]="c">
    {{ c }}
  </option>

</select>

  
  <input 
    class="form-control"
    placeholder="Search..."
    [(ngModel)]="searchText"
    (input)="search()"
  >


  <button class="btn btn-outline-light" (click)="search()">
    
    <i class="ri-search-line"></i>Search
  </button>

</div>
  
    <div class="d-flex align-items-center gap-3">

      <button class="btn btn-outline-light btn-sm" (click)="goToOrders()">
        Orders
      </button>

      <button class="btn btn-warning btn-sm" (click)="goToCart()">
        <i class="ri-shopping-cart-2-fill"></i>
        Cart ({{ cartCount }})
      </button>
<div class="position-relative"
     (mouseenter)="showDropdown = true"
     (mouseleave)="showDropdown = false">

  
  <div class="text-white px-2 py-1 rounded"
       style="cursor:pointer;">
    {{ username }} <i class="ri-user-3-line"></i>
  </div>

  
  <div *ngIf="showDropdown"
       class="bg-white shadow rounded position-absolute"
       style="top:100%; right:0; min-width:150px; z-index:1000;">

    <button class="dropdown-item w-100 text-start"
            (click)="goToProfile()">
      Edit Profile
    </button>

    <button class="dropdown-item w-100 text-start text-danger"
            (click)="logout()">
      Logout
    </button>

  </div>

</div>

    </div>

  </nav>

  
  <div class="container mt-4">

    <div class="row">

      <div class="col-lg-3 col-md-4 col-sm-6 mb-3" *ngFor="let p of displayedProducts">

       <div class="card h-100 shadow-sm" (click)="viewProduct(p)" style="cursor:pointer;">

  <img 
    [src]="p.imageUrl || 'assets/no-image.png'"
    class="card-img-top p-2"
    style="height:180px; object-fit:contain;"
  >

  <div class="card-body text-center">
    <h6>{{ p.name }}</h6>
    <p class="text-muted">{{ p.category }}</p>
    <p class="fw-bold">₹ {{ p.price }}</p>

    <button 
  class="btn w-100"
  [ngClass]="p.quantity === 0 ? 'btn-secondary' : 'btn-warning'"
  [disabled]="p.quantity === 0"
  (click)="addToCart(p); $event.stopPropagation()">

  <i class="ri-shopping-cart-2-fill"></i>{{ p.quantity === 0 ? 'Out of Stock' : 'Add to Cart' }}

</button>
  </div>

</div>

      </div>

    </div>

    <div *ngIf="displayedProducts.length === 0" class="text-center text-muted">
      No products found
    </div>

  </div>

</div>
