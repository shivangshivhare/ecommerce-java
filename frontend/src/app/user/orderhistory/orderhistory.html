<div class="container mt-4">


  <div class="d-flex justify-content-between align-items-center mb-3">

    <button class="btn btn-secondary btn-sm" (click)="goBack()">Back</button>

    <div class="dropdown">
      <span class="badge bg-primary px-3 py-2 dropdown-toggle" data-bs-toggle="dropdown" style="cursor:pointer">
        {{username}}
      </span>

      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item text-danger" (click)="logout()">Logout</a></li>
      </ul>
    </div>

  </div>

  
  <div class="card shadow-sm">
    <div class="card-body p-0">

      <table class="table table-bordered mb-0 text-center">

        <thead class="table-primary">
          <tr>
            <th>Order Details</th>
            <th>Total Amount</th>
            <th>Order Status</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngFor="let order of orders">

        
            <td>
              <div *ngFor="let item of order.items">
                {{item.name}} (x{{item.quantity}})
              </div>
            </td>

    
            <td>₹ {{order.total}}</td>

        
            <td>
              <span 
                [ngClass]="{
                  'text-success': order.status === 'COMPLETED',
                  'text-danger': order.status === 'CANCELLED',
                  'text-warning': order.status === 'PENDING'
                }">
                {{order.status}}
              </span>
            </td>

        
            <td>
              <button 
                *ngIf="order.status !== 'COMPLETED' && order.status !== 'CANCELLED'"
                class="btn btn-sm btn-danger"
                (click)="cancelOrder(order)">
                Cancel
              </button>

              <span *ngIf="order.status === 'COMPLETED' || order.status === 'CANCELLED'">
                -
              </span>
            </td>

          </tr>

          <tr *ngIf="orders.length === 0">
            <td colspan="4">No orders found</td>
          </tr>

        </tbody>

      </table>

    </div>
  </div>

</div>
